<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGT · Dashboard v16.0</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Russo+One&family=Exo+2:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --s1: #0a0e14;
            --s2: #101620;
            --A: #00d4ff;
            --G: #00e676;
            --Y: #ffd740;
            --R: #ff1744;
            --tx: #b0c4d8;
            --tx-br: #ffffff;
            --glass: blur(12px) saturate(180%);
            --r: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg);
            color: var(--tx);
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .logo {
            font-family: 'Russo One', sans-serif;
            font-size: 20px;
            color: var(--A);
            letter-spacing: 2px;
        }

        .refresh-btn {
            background: rgba(0, 212, 255, 0.1);
            color: var(--A);
            border: 1px solid var(--A);
            padding: 8px 16px;
            border-radius: 6px;
            font-family: 'Share Tech Mono', monospace;
            cursor: pointer;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: var(--A);
            color: #000;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--s2);
            padding: 20px;
            border-radius: var(--r);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
        }

        .stat-val {
            font-family: 'Share Tech Mono', monospace;
            font-size: 32px;
            color: var(--tx-br);
            margin: 10px 0;
        }

        .stat-lbl {
            font-size: 11px;
            text-transform: uppercase;
            color: var(--tx);
            letter-spacing: 1px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 25px;
        }

        @media (max-width: 900px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: var(--s2);
            border-radius: var(--r);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            overflow: hidden;
        }

        h3 {
            font-family: 'Russo One', sans-serif;
            font-size: 14px;
            margin-bottom: 20px;
            color: var(--A);
            letter-spacing: 1px;
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-family: 'Share Tech Mono', monospace;
            color: var(--tx);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .source-tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-family: 'Share Tech Mono', monospace;
        }

        .tag-web {
            background: rgba(0, 212, 255, 0.1);
            color: var(--A);
            border: 1px solid var(--A);
        }

        .tag-mobile {
            background: rgba(0, 230, 118, 0.1);
            color: var(--G);
            border: 1px solid var(--G);
        }

        .loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--A);
            z-index: 1000;
            display: none;
            animation: load 2s infinite;
        }

        @keyframes load {
            0% {
                transform: translateX(-100%);
            }

            100% {
                transform: translateX(100%);
            }
        }
    </style>
</head>

<body>

    <div class="loader" id="loader"></div>

    <header>
        <div class="logo">SIGT CORE <span style="font-size:12px; opacity:0.5; font-family: 'Share Tech Mono'">DASHBOARD
                v16.0</span></div>
        <button class="refresh-btn" onclick="fetchData()">🔄 REFRESCAR</button>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-lbl">Incidencias Totales</div>
            <div class="stat-val" id="totalCount">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-lbl">Desde Web App</div>
            <div class="stat-val" id="webCount" style="color:var(--A)">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-lbl">Desde Mobile App</div>
            <div class="stat-val" id="mobileCount" style="color:var(--G)">0</div>
        </div>
    </div>

    <div class="main-grid">
        <div class="card">
            <h3>🗂️ Registro Maestro Real-Time</h3>
            <div class="table-wrap">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Ticket</th>
                            <th>Salón</th>
                            <th>Origen</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Datos aquí -->
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card">
            <h3>📈 Distribución por Origen</h3>
            <canvas id="sourceChart"></canvas>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxR9GGkO_-uYW47PXtnFxU7Dq-2shyaekTJAPqvLDSqcHiA4F8Is1xtslWNdDgtE-US/exec'; // URL del Script con ?op=getData
        let myChart = null;

        async function fetchData() {
            const loader = document.getElementById('loader');
            loader.style.display = 'block';

            if (!SCRIPT_URL) {
                alert("Por favor, configura la SCRIPT_URL en el código.");
                loader.style.display = 'none';
                return;
            }

            try {
                const response = await fetch(SCRIPT_URL + '?op=getData');
                const data = await response.json();
                renderAll(data);
            } catch (err) {
                console.error(err);
            } finally {
                loader.style.display = 'none';
            }
        }

        function renderAll(data) {
            // Stats
            const web = data.filter(r => r.origen === 'Web').length;
            const mobile = data.filter(r => r.origen === 'Mobile').length;
            document.getElementById('totalCount').innerText = data.length;
            document.getElementById('webCount').innerText = web;
            document.getElementById('mobileCount').innerText = mobile;

            // Table
            const tbody = document.querySelector('#dataTable tbody');
            tbody.innerHTML = '';
            data.slice(0, 15).forEach(row => {
                const tr = document.createElement('tr');
                const date = new Date(row.fecha).toLocaleDateString() + ' ' + new Date(row.fecha).toLocaleTimeString([], { hour: '2bit', minute: '2-digit' });
                tr.innerHTML = `
                    <td>${date}</td>
                    <td style="font-family:'Share Tech Mono'; color:var(--tx-br)">${row.ticket}</td>
                    <td>${row.salon}</td>
                    <td><span class="source-tag tag-${row.origen.toLowerCase()}">${row.origen}</span></td>
                    <td style="color:var(--Y)">PENDIENTE</td>
                `;
                tbody.appendChild(tr);
            });

            // Chart
            updateChart(web, mobile);
        }

        function updateChart(web, mobile) {
            const ctx = document.getElementById('sourceChart').getContext('2d');
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Web App', 'Mobile App'],
                    datasets: [{
                        data: [web, mobile],
                        backgroundColor: ['#00d4ff', '#00e676'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#b0c4d8', font: { family: 'Exo 2' } } }
                    }
                }
            });
        }

        // Auto-fetch on load (if URL is set)
        if (SCRIPT_URL) fetchData();
    </script>
</body>

</html>
